services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rmf_root
      MYSQL_DATABASE: rmfacilities_wp
      MYSQL_USER: rmf_user
      MYSQL_PASSWORD: rmf_pass
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.6-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: rmfacilities_wp
      WORDPRESS_DB_USER: rmf_user
      WORDPRESS_DB_PASSWORD: rmf_pass
      WORDPRESS_TABLE_PREFIX: rmf_
    volumes:
      - wp_data:/var/www/html
      - ./rmfacilities-onepage:/var/www/html/wp-content/themes/rmfacilities-onepage

volumes:
  db_data:
  wp_data:
